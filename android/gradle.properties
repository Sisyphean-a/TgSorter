# --- 内存与性能优化 ---
# 建议设为 4G。对于 16G 内存的电脑，4G 是 Gradle 的黄金分割点。
# 512m 的元空间足够支撑 99% 的 Flutter 项目，1G 的代码缓存能加速编译。
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=1024m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# --- 核心加速开关 ---
# 【最重要】开启配置缓存。能把那 30 秒的“校验时间”缩短到几秒。
# org.gradle.configuration-cache=true

# 开启并行构建
org.gradle.parallel=true

# 开启增量构建缓存，跳过未修改的代码。
org.gradle.caching=true

# 让 Gradle 守护进程常驻内存，下次启动更快。
org.gradle.daemon=true

# --- Android 兼容性 ---
android.useAndroidX=true
android.enableJetifier=false
# 开启非传递性 R 类，能显著提升大型安卓模块的增量编译速度
android.nonTransitiveRClass=true

# --- Java 版本锁定 ---
# 显式指定 Gradle 使用 Android Studio 内置 JDK 21，避免落回系统 JDK 8。
# org.gradle.java.home=D:/Program Files/Android/jbr
